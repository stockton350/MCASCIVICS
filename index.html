    total += parts;
    if (qi < currentQ) done += parts;
    else if (qi === currentQ) done += currentPart;
  });
  return Math.round((done / total) * 100);
}

function partSuffix() {
  const q = questions[currentQ];
  if (!q.parts || q.parts.length === 1) return "";
  return ` · Part ${String.fromCharCode(65 + currentPart)}`;
}


function escapeAttr(value) {
  return String(value || "").replace(/&/g, "&amp;").replace(/"/g, "&quot;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function renderSupportMaterial(q) {
  if (q.sources && q.sources.length) {
    const buttons = q.sources.map((source, i) => `
      <button class="source-chip" onclick="openSource(${i})">
        <span class="source-chip-kicker">${q.sources.length > 1 ? 'Source ' + (i + 1) : 'Source'}</span>
        <span class="source-chip-title">${source.title}</span>
      </button>
    `).join("");
    return `
      <div class="source-panel">
        <div class="source-panel-text">${q.context || 'Read and examine the source before answering.'}</div>
        <div class="source-chip-row">${buttons}</div>
      </div>
    `;
  }
  if (q.context) {
    return `<div class="context-box"><strong>Context:</strong> ${q.context}</div>`;
  }
  return "";
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────

function render() {
  const q = questions[currentQ];
  const part = getActivePart();
  const progress = progressPercent();

  let html = `
    <div class="header">
      <div class="header-left">
        <div class="title">Grade 8 Civics · MCAS Spring 2025</div>
        <div class="subtitle">Massachusetts Dept. of Elementary &amp; Secondary Education</div>
      </div>
      <div class="score-badge">Score: ${score} / ${totalSRParts()}</div>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar" style="width:${progress}%"></div>
    </div>
    <div class="progress-label">Question ${currentQ + 1} of ${questions.length}${partSuffix()} &nbsp;·&nbsp; ${progress}% complete</div>

    <div class="card">
      <div class="card-top">
        <span class="q-num">Q${q.id}</span>
        <span class="badge badge-section">${q.section}</span>
        <span class="badge badge-topic">${q.topic}</span>
        <span class="badge badge-type ${q.type === 'CR' ? 'badge-cr' : ''}">${q.type === 'CR' ? 'Constructed Response' : 'Selected Response'}</span>
      </div>

      ${renderSupportMaterial(q)}
  `;

  if (q.type === "CR") {
    if (q.parts) {
      html += `<div class="cr-parts">`;
      q.parts.forEach(p => {
        html += `
          <div class="cr-part">
            <div class="cr-part-label">Part ${p.part}</div>
            <div class="cr-prompt">${p.prompt}</div>
          </div>
        `;
      });
      html += `</div>`;
    } else {
      html += `<div class="cr-prompt">${q.prompt}</div>`;
    }

    html += `
      <div class="cr-builder">
        <div class="cr-builder-title">Build your response</div>
        <ul>
          <li>Answer every part of the question.</li>
          <li>Use evidence from the source or scenario when the question asks for it.</li>
          <li>Explain your reasoning in your own words.</li>
        </ul>
        <textarea class="cr-draft" placeholder="Draft your response here, or write it on paper."></textarea>
      </div>
      <div class="card-actions">
        <button class="btn-secondary" onclick="showExplanation()">See Sample Response</button>
        <button class="btn-primary" onclick="advance()">${isLastQuestion() ? "See Results" : "Mark Complete"}</button>
      </div>
    `;
  } else {
    // SR question
    const prompt = part.prompt;
    const options = part.options;
    const correctAnswer = part.answer;

    html += `<div class="sr-prompt">${prompt}</div><div class="options">`;

    Object.entries(options).forEach(([key, val]) => {
      let cls = "option";
      let icon = "";
      if (answered) {
        if (key === correctAnswer) {
          cls += " option-correct";
          icon = `<span class="option-icon correct-icon">✓</span>`;
        } else if (key === selectedOption) {
          cls += " option-wrong";
          icon = `<span class="option-icon wrong-icon">✗</span>`;
        } else {
          cls += " option-dimmed";
        }
      }
      html += `
        <button class="${cls}" onclick="selectOption('${key}')" ${answered ? "disabled" : ""}>
          <span class="option-key">${key}</span>
          <span class="option-text">${val}</span>
          ${icon}
        </button>
      `;
    });

    html += `</div>`;

    if (answered) {
      const wasCorrect = selectedOption === correctAnswer;
      html += `
        <div class="feedback ${wasCorrect ? 'feedback-correct' : 'feedback-wrong'}">
          ${wasCorrect
            ? `<strong>Correct.</strong> Well done.`
            : `<strong>Incorrect.</strong> The correct answer is <strong>${correctAnswer}: ${options[correctAnswer]}</strong>.`
          }
        </div>
        <div class="card-actions">
          <button class="btn-secondary" onclick="showExplanation()">See Explanation</button>
          <button class="btn-primary" onclick="advance()">${isLastQuestion() ? "See Results →" : "Next →"}</button>
        </div>
      `;
    }
  }

  html += `</div>`; // end .card

  document.getElementById("app").innerHTML = html;
}

function renderResults() {
  const total = totalSRParts();
  const pct = Math.round((score / total) * 100);

  let breakdown = `<div class="results-breakdown">`;
  results.forEach(r => {
    if (r.type === "CR") {
      breakdown += `
        <div class="result-row result-completed">
          <span class="result-icon">✓</span>
          <span class="result-qid">Q${r.qId}</span>
          <span class="result-topic">${r.topic}</span>
          <span class="result-status">Completed · not auto-scored</span>
        </div>
      `;
    } else {
      breakdown += `
        <div class="result-row ${r.correct ? 'result-correct' : 'result-wrong'}">
          <span class="result-icon">${r.correct ? '✓' : '✗'}</span>
          <span class="result-qid">Q${r.qId}${r.partLabel ? ' · ' + r.partLabel : ''}</span>
          <span class="result-topic">${r.topic}</span>
          <span class="result-status">${r.correct ? 'Correct' : `Correct: ${r.correctAnswer}`}</span>
        </div>
      `;
    }
  });
  breakdown += `</div>`;

  document.getElementById("app").innerHTML = `
    <div class="header">
      <div class="header-left">
        <div class="title">Grade 8 Civics · MCAS Spring 2025</div>
        <div class="subtitle">Quiz Complete</div>
      </div>
    </div>
    <div class="card results-card">
      <h2>Quiz Complete!</h2>
      <div class="big-score">${score} <span class="big-score-denom">/ ${total}</span></div>
      <div class="big-pct">${pct}%</div>
      <p class="results-summary">
        ${pct >= 80 ? "Excellent work. You have a strong grasp of Grade 8 Civics." :
          pct >= 60 ? "Good effort. Review the questions you missed and try again." :
          "Keep studying. Review the explanations for each question to strengthen your understanding."}
      </p>
      ${breakdown}
      <button class="btn-primary" onclick="restart()" style="margin-top:24px">Restart Quiz</button>
    </div>
  `;
}

// ─────────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────────

function selectOption(key) {
  if (answered) return;
  answered = true;
  selectedOption = key;

  const q = questions[currentQ];
  const part = getActivePart();
  const correctAnswer = part.answer;
  const options = part.options;
  const wasCorrect = key === correctAnswer;

  if (wasCorrect) score++;

  results.push({
    qId: q.id,
    partLabel: q.parts && q.parts.length > 1 ? `Part ${String.fromCharCode(65 + currentPart)}` : null,
    topic: q.topic,
    correct: wasCorrect,
    correctAnswer: `${correctAnswer}`
  });

  render();
}

function advance() {
  const q = questions[currentQ];
  if (q.type === "CR" && !results.some(r => r.qId === q.id && r.type === "CR")) {
    results.push({ qId: q.id, topic: q.topic, type: "CR", completed: true });
  }
  if (!isLastPartOfQuestion()) {
    currentPart++;
    answered = false;
    selectedOption = null;
    render();
    return;
  }
  if (isLastQuestion()) {
    renderResults();
    return;
  }
  currentQ++;
  currentPart = 0;
  answered = false;
  selectedOption = null;
  render();
}

function showExplanation() {
  const q = questions[currentQ];
  const part = getActivePart();
  const expText = (part && part.explanation) ? part.explanation : q.explanation;
  document.getElementById("modal-body").innerHTML = expText || "No explanation available.";
  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function openSource(index) {
  const q = questions[currentQ];
  if (!q.sources || !q.sources[index]) return;
  const source = q.sources[index];
  document.getElementById("source-title").textContent = source.title || "Source";
  const img = document.getElementById("source-image");
  img.src = source.src;
  img.alt = source.alt || source.title || "Source image";
  document.getElementById("source-modal").style.display = "flex";
}

function closeSourceModal() {
  document.getElementById("source-modal").style.display = "none";
}

function restart() {
  currentQ = 0; currentPart = 0; score = 0;
  answered = false; selectedOption = null; results = [];
  render();
}

document.addEventListener("click", e => {
  if (e.target === document.getElementById("modal")) closeModal();
  if (e.target === document.getElementById("source-modal")) closeSourceModal();
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────

// Inject modal once
document.body.insertAdjacentHTML("beforeend", `
  <div id="modal" class="app-modal" style="display:none">
    <div class="modal-box explanation-box">
      <div class="modal-header">
        <strong>Explanation</strong>
        <button onclick="closeModal()" class="modal-close" aria-label="Close explanation">×</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>
  <div id="source-modal" class="app-modal" style="display:none">
    <div class="modal-box source-box">
      <div class="modal-header source-header">
        <strong id="source-title">Source</strong>
        <button onclick="closeSourceModal()" class="modal-close" aria-label="Close source">×</button>
      </div>
      <div class="source-modal-body">
        <img id="source-image" src="" alt="" />
      </div>
    </div>
  </div>
`);

render();
</script>
